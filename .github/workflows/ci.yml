# .github/workflows/ci.yml
# CI pipeline: lint + test backend, build frontend, build Docker images.
# On push to main: also push images and deploy (SSH to VPS).

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── Backend tests ──────────────────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        # pgvector/pgvector:pg15 instead of postgres:15-alpine so the
        # `vector` extension is available for RAG/chatbot migrations and tests.
        # Without it, migration 0024_chatbot_models.py silently skips the
        # vector column + HNSW index, and semantic search tests run in a
        # degraded no-extension state that doesn't match production.
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: lms_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SECRET_KEY: test-secret-key-for-ci
      DEBUG: "True"
      DB_NAME: lms_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0
      MAIC_V2_ENABLED: "true"
      MAIC_GENERATION_USE_V2: "true"
      # Phase 2 target: 60%. Raise to 75% once integration tests are added.
      COV_FAIL_UNDER: "60"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run migrations
        run: python manage.py migrate --noinput
        working-directory: backend

      - name: Run tests with coverage
        run: |
          pytest --cov=apps --cov=utils --cov=config \
                 --cov-report=xml \
                 --cov-report=html \
                 --cov-report=term-missing \
                 --cov-report=json \
                 --cov-fail-under="${COV_FAIL_UNDER}" \
                 -v
        working-directory: backend

      - name: Download base branch coverage artifact
        id: download-baseline
        if: always() && github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v6
        with:
          name: backend-coverage-report
          branch: ${{ github.event.pull_request.base.ref }}
          workflow: ci.yml
          path: /tmp/base-coverage
          if_no_artifact_found: ignore
        continue-on-error: true

      - name: Coverage trend check (warn on regression)
        if: always() && github.event_name == 'pull_request'
        run: |
          # Extract current coverage percentage from JSON report
          CURRENT=$(python -c "import json; d=json.load(open('coverage.json')); print(round(d['totals']['percent_covered'], 2))")
          echo "Current coverage: ${CURRENT}%"

          # Check if baseline artifact was downloaded
          if [ -f /tmp/base-coverage/coverage.json ]; then
            BASELINE=$(python -c "import json; d=json.load(open('/tmp/base-coverage/coverage.json')); print(round(d['totals']['percent_covered'], 2))")
            echo "Baseline coverage: ${BASELINE}%"
            DROP=$(python -c "print(round($BASELINE - $CURRENT, 2))")
            if python -c "exit(0 if $CURRENT < $BASELINE else 1)"; then
              echo "::warning::Coverage dropped by ${DROP}% (${BASELINE}% -> ${CURRENT}%). Please add tests to maintain coverage."
            else
              GAIN=$(python -c "print(round($CURRENT - $BASELINE, 2))")
              echo "::notice::Coverage improved by ${GAIN}% (${BASELINE}% -> ${CURRENT}%)"
            fi
          else
            echo "No baseline coverage artifact found (first run or new branch) — skipping trend comparison."
          fi
        working-directory: backend
        continue-on-error: true

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-report
          path: |
            backend/coverage.xml
            backend/coverage.json
            backend/htmlcov/
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
        continue-on-error: true
      
      - name: Audit Python dependencies
        # Fails build on high/critical vulnerabilities
        # To temporarily bypass (e.g., no fix available), set AUDIT_ALLOW_FAIL=true in repository variables
        run: pip install pip-audit && pip-audit --strict --desc on -r backend/requirements.txt
        continue-on-error: ${{ vars.AUDIT_ALLOW_FAIL == 'true' }}

  # ── Frontend tests & build ─────────────────────────────────────────────
  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend
      
      - name: Run tests
        run: npm test -- --passWithNoTests
        working-directory: frontend
        env:
          CI: true
      
      - name: Audit npm dependencies
        # Fails build on high/critical runtime vulnerabilities only.
        # Dev-tooling transitive vulnerabilities (CRA/toolchain) are tracked separately.
        # To temporarily bypass, set AUDIT_ALLOW_FAIL=true in repository variables
        run: npm audit --omit=dev --audit-level=high
        working-directory: frontend
        continue-on-error: ${{ vars.AUDIT_ALLOW_FAIL == 'true' }}
      
      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          REACT_APP_API_URL: /api
          CI: "false"  # don't treat warnings as errors

  # ── E2E tests (BLOCKING) ─────────────────────────────────────────────────
  # Preferred: set E2E_BASE_URL + credentials to run against staging/preview.
  # Fallback: when no external target is configured, CI starts a real local
  # Django + Vite stack, seeds the demo tenant, and runs the MAIC classroom
  # playback smoke. The broader portal sweep belongs in the dedicated E2E
  # workflow so main-push CI stays fast while still protecting the AI Classroom
  # production path. E2E_SKIP_BLOCKING=true remains a temporary emergency
  # bypass only.
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [backend-test, frontend-test]
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: lms_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SECRET_KEY: e2e-ci-secret-key-not-used-in-production
      DEBUG: "True"
      DB_NAME: lms_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      REDIS_URL: redis://127.0.0.1:6379/0
      PLATFORM_DOMAIN: localhost
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      LLM_PROVIDER: "auto"
      MAIC_V2_ENABLED: "true"
      MAIC_GENERATION_USE_V2: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Resolve E2E mode
        id: e2e-mode
        run: |
          if [ -n "$E2E_URL" ]; then
            echo "mode=external" >> "$GITHUB_OUTPUT"
            echo "::notice::Running E2E against configured external target."
          elif [ "$E2E_SKIP_BLOCKING" = "true" ]; then
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            echo "::warning::E2E_BASE_URL is not set and E2E_SKIP_BLOCKING=true, so E2E is skipped. This must stay temporary."
          else
            echo "mode=local" >> "$GITHUB_OUTPUT"
            echo "::notice::E2E_BASE_URL is not set; running the real local Django + Vite + MAIC Playwright stack."
          fi
        env:
          E2E_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_SKIP_BLOCKING: ${{ vars.E2E_SKIP_BLOCKING }}

      - name: Set up Node for external E2E
        uses: actions/setup-node@v4
        if: steps.e2e-mode.outputs.mode == 'external'
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install external Playwright suite
        if: steps.e2e-mode.outputs.mode == 'external'
        run: |
          npm ci
          npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run external E2E tests
        if: steps.e2e-mode.outputs.mode == 'external'
        run: npm test -- --project=chromium
        working-directory: e2e
        env:
          BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_TEACHER_EMAIL: ${{ secrets.E2E_TEACHER_EMAIL }}
          E2E_TEACHER_PASSWORD: ${{ secrets.E2E_TEACHER_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

      - name: Set up Python for local E2E
        uses: actions/setup-python@v5
        if: steps.e2e-mode.outputs.mode == 'local'
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies for local E2E
        if: steps.e2e-mode.outputs.mode == 'local'
        run: pip install -r backend/requirements.txt

      - name: Set up Node for local E2E
        uses: actions/setup-node@v4
        if: steps.e2e-mode.outputs.mode == 'local'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies for local E2E
        if: steps.e2e-mode.outputs.mode == 'local'
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Run local E2E migrations
        if: steps.e2e-mode.outputs.mode == 'local'
        run: python manage.py migrate --noinput
        working-directory: backend

      - name: Seed local E2E demo tenant
        if: steps.e2e-mode.outputs.mode == 'local'
        run: python manage.py create_demo_tenant
        working-directory: backend

      - name: Start local E2E Django server
        if: steps.e2e-mode.outputs.mode == 'local'
        run: |
          python manage.py runserver 0.0.0.0:8000 \
            --settings=config.settings \
            > /tmp/django.log 2>&1 &
          echo "Django PID: $!"
        working-directory: backend

      - name: Wait for local E2E Django server
        if: steps.e2e-mode.outputs.mode == 'local'
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8000/health/ > /dev/null 2>&1; then
              echo "Django is up after ${i}s"
              break
            fi
            echo "Waiting for Django... attempt ${i}/20"
            sleep 2
          done
          curl -sf http://127.0.0.1:8000/health/ || \
            (echo "Django failed to start:" && cat /tmp/django.log && exit 1)

      - name: Start local E2E Vite server
        if: steps.e2e-mode.outputs.mode == 'local'
        run: |
          VITE_API_BASE_URL=http://127.0.0.1:8000 \
            npm run dev -- --host 0.0.0.0 --port 3000 \
            > /tmp/vite.log 2>&1 &
          echo "Vite PID: $!"
        working-directory: frontend

      - name: Wait for local E2E Vite server
        if: steps.e2e-mode.outputs.mode == 'local'
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3000/ > /dev/null 2>&1; then
              echo "Vite is up after ${i}s"
              break
            fi
            echo "Waiting for Vite... attempt ${i}/30"
            sleep 3
          done
          curl -sf http://127.0.0.1:3000/ || \
            (echo "Vite failed to start:" && cat /tmp/vite.log && exit 1)

      - name: Install local Playwright Chromium
        if: steps.e2e-mode.outputs.mode == 'local'
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run local MAIC E2E smoke tests
        if: steps.e2e-mode.outputs.mode == 'local'
        run: |
          npx playwright test --config=playwright.config.cjs \
            e2e/maic-full-playback.spec.js \
            e2e/maic-mobile-playback.spec.js
        working-directory: frontend
        env:
          E2E_LIVE: "1"
          E2E_BASE_URL: http://127.0.0.1:3000
          E2E_TEACHER_EMAIL: ${{ secrets.E2E_TEACHER_EMAIL || 'teacher@demo.learnpuddle.com' }}
          E2E_TEACHER_PASSWORD: ${{ secrets.E2E_TEACHER_PASSWORD || 'Teacher@123' }}
          E2E_STUDENT_EMAIL: ${{ secrets.E2E_STUDENT_EMAIL || 'student@demo.learnpuddle.com' }}
          E2E_STUDENT_PASSWORD: ${{ secrets.E2E_STUDENT_PASSWORD || 'Student@123' }}

      - name: E2E temporary bypass notice
        if: steps.e2e-mode.outputs.mode == 'skip'
        run: echo "E2E was skipped because E2E_SKIP_BLOCKING=true. Remove this bypass after staging E2E secrets are configured."

      - name: Upload external Playwright report
        uses: actions/upload-artifact@v4
        if: always() && steps.e2e-mode.outputs.mode == 'external'
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Upload local Playwright report
        uses: actions/upload-artifact@v4
        if: always() && steps.e2e-mode.outputs.mode == 'local'
        with:
          name: playwright-report-local
          path: |
            frontend/e2e-report/
            frontend/e2e-results/
          retention-days: 7

      - name: Upload local E2E server logs
        uses: actions/upload-artifact@v4
        if: always() && steps.e2e-mode.outputs.mode == 'local'
        with:
          name: server-logs-local-e2e
          path: |
            /tmp/django.log
            /tmp/vite.log
          retention-days: 3

  # ── Build & push Docker images (staging - develop branch) ────────────────
  docker-build-staging:
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    needs: [backend-test, frontend-test, e2e-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend (staging)
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:staging

      - name: Build & push frontend (staging)
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          build-args: |
            BUILD_SHA=${{ github.sha }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:staging

  # ── Deploy to Staging (develop branch) ────────────────────────────────────
  deploy-staging:
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    needs: docker-build-staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add staging host key
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_PORT: ${{ secrets.STAGING_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "$STAGING_PORT" -H "$STAGING_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to Staging via SSH
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_PORT: ${{ secrets.STAGING_PORT || '22' }}
          NEW_SHA: ${{ github.sha }}
        run: |
          ssh \
            -p "$STAGING_PORT" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            "$STAGING_USER@$STAGING_HOST" "NEW_SHA=$NEW_SHA bash -se" <<'ENDSSH'
          set -euo pipefail
          cd /opt/lms-staging
          DOMAIN="$(awk -F= '/^STAGING_DOMAIN=/{print $2}' .env.staging 2>/dev/null | tail -1 | tr -d '\r')"
          if [ -z "$DOMAIN" ]; then DOMAIN="staging.learnpuddle.com"; fi

          # ── Capture rollback SHA before touching anything ──────────────
          PREV_SHA="$(cat .deployed-sha 2>/dev/null || echo '')"
          echo "Current staging SHA: ${PREV_SHA:-none}"
          echo "Deploying new staging SHA: $NEW_SHA"

          # Pull new staging images
          docker compose -f docker-compose.staging.yml pull < /dev/null
          # Run migrations
          docker compose -f docker-compose.staging.yml up -d db redis < /dev/null
          docker compose -f docker-compose.staging.yml run --rm -T web python manage.py migrate --noinput < /dev/null
          docker compose -f docker-compose.staging.yml run --rm -T -u root web python manage.py collectstatic --noinput < /dev/null
          # Restart all services
          docker compose -f docker-compose.staging.yml up -d --remove-orphans < /dev/null

          # ── Health check — auto-rollback on failure ───────────────────
          sleep 10
          if ! ./scripts/check-origin-health.sh docker-compose.staging.yml "$DOMAIN"; then
            echo "::error::Staging health check failed after deploy — initiating rollback to ${PREV_SHA:-unknown}"
            if [ -n "$PREV_SHA" ]; then
              REGISTRY="ghcr.io/${{ github.repository }}"
              docker pull "${REGISTRY}/backend:${PREV_SHA}" \
                && docker tag "${REGISTRY}/backend:${PREV_SHA}" "${REGISTRY}/backend:staging"
              docker compose -f docker-compose.staging.yml up -d --remove-orphans < /dev/null
              sleep 10
              if ./scripts/check-origin-health.sh docker-compose.staging.yml "$DOMAIN"; then
                echo "::notice::Rollback to $PREV_SHA succeeded on staging."
              else
                echo "::error::Rollback also failed on staging — manual intervention required!"
              fi
            else
              echo "::warning::No previous SHA recorded; cannot auto-rollback staging."
            fi
            exit 1
          fi

          # ── Record new SHA for future rollbacks ───────────────────────
          echo "$NEW_SHA" > .deployed-sha
          echo "Staging deployment of $NEW_SHA complete!"
          ENDSSH

  # ── Build & push Docker images (production - main branch) ────────────────
  docker-build:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend-test, frontend-test, e2e-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}

      - name: Build & push frontend/nginx
        uses: docker/build-push-action@v7
        with:
          context: .
          file: nginx/Dockerfile
          build-args: |
            BUILD_SHA=${{ github.sha }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nginx:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nginx:${{ github.sha }}

  # ── Deploy to Production (main branch) ──────────────────────────────────
  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: docker-build
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 40
    permissions:
      contents: read
      packages: read
    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add production host key
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to Production via SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          NEW_SHA: ${{ github.sha }}
        run: |
          timeout 35m ssh \
            -p "$DEPLOY_PORT" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            "$DEPLOY_USER@$DEPLOY_HOST" "NEW_SHA=$NEW_SHA bash -se" <<'ENDSSH'
          set -euo pipefail
          cd /opt/lms

          log_step() {
            echo "== $(date -u +'%Y-%m-%dT%H:%M:%SZ') $* =="
          }

          DOMAIN="$(awk -F= '/^PLATFORM_DOMAIN=/{print $2}' .env 2>/dev/null | tail -1 | tr -d '\r')"
          if [ -z "$DOMAIN" ]; then DOMAIN="localhost"; fi

          # ── Capture rollback SHA before touching anything ──────────────
          PREV_SHA="$(cat .deployed-sha 2>/dev/null || echo '')"
          echo "Current deployed SHA: ${PREV_SHA:-none}"
          echo "Deploying new SHA: $NEW_SHA"

          log_step "Syncing deploy checkout"
          # Keep the deploy checkout deterministic. git clean -fd removes
          # non-ignored drift while preserving ignored secrets/assets such as
          # .env and media files.
          git fetch origin main
          git reset --hard origin/main
          git clean -fd

          log_step "Ensuring nginx SSL material"
          ./scripts/ensure-nginx-ssl.sh "$DOMAIN"

          log_step "Pruning Docker cache without touching volumes"
          # Do not prune volumes here: postgres_data, redis_data, media_files,
          # and static_files are production data.
          docker system df || true
          docker container prune -f || true
          docker builder prune -af || true
          docker image prune -af || true
          docker system df || true

          log_step "Pulling CI-built deploy images"
          # Backend runtime services all share lms-backend:latest. The nginx
          # image carries the built frontend bundle plus production nginx
          # config. Pull both from GHCR instead of building on the droplet;
          # this avoids containerd disk exhaustion and long silent builds.
          REGISTRY="ghcr.io/${{ github.repository }}"
          printf '%s' '${{ secrets.GITHUB_TOKEN }}' \
            | docker login ghcr.io -u '${{ github.actor }}' --password-stdin >/dev/null
          docker pull "${REGISTRY}/backend:${NEW_SHA}"
          docker tag "${REGISTRY}/backend:${NEW_SHA}" "lms-backend:latest"
          docker pull "${REGISTRY}/nginx:${NEW_SHA}"
          docker tag "${REGISTRY}/nginx:${NEW_SHA}" "lms-nginx:latest"
          docker compose -f docker-compose.prod.yml pull db redis

          log_step "Starting database and Redis"
          # ── Run migrations BEFORE restarting (prevents schema mismatch) ─
          # IMPORTANT: every `docker compose run` below redirects stdin from
          # /dev/null. Without it, compose-run swallows the heredoc's stdin
          # (even with `-T`) and bash hits EOF prematurely — the remaining
          # commands (collectstatic, up -d, health check) are silently
          # skipped while the SSH step still reports exit 0 = success.
          # Found the hard way after a deploy shipped stale frontend.
          docker compose -f docker-compose.prod.yml up -d db redis < /dev/null
          log_step "Running database migrations"
          docker compose -f docker-compose.prod.yml run --rm -T web python manage.py migrate --noinput < /dev/null
          log_step "Collecting static assets"
          docker compose -f docker-compose.prod.yml run --rm -T -u root web python manage.py collectstatic --noinput < /dev/null

          log_step "Restarting application services"
          # ── Restart all services with new code ────────────────────────
          docker compose -f docker-compose.prod.yml up -d --remove-orphans < /dev/null

          log_step "Running origin health checks"
          # ── Health check — auto-rollback on failure ───────────────────
          sleep 10
          if ! ./scripts/check-origin-health.sh docker-compose.prod.yml "$DOMAIN"; then
            echo "::group::nginx diagnostics"
            docker compose -f docker-compose.prod.yml ps nginx || true
            docker compose -f docker-compose.prod.yml logs --tail=160 nginx || true
            docker compose -f docker-compose.prod.yml run --rm -T nginx nginx -t || true
            echo "::endgroup::"
            echo "::error::Health check failed after deploy — initiating rollback to ${PREV_SHA:-unknown}"
            if [ -n "$PREV_SHA" ]; then
              REGISTRY="ghcr.io/${{ github.repository }}"
              if docker pull "${REGISTRY}/backend:${PREV_SHA}"; then
                docker tag "${REGISTRY}/backend:${PREV_SHA}" "lms-backend:latest"
              else
                echo "::warning::Rollback backend image ${PREV_SHA} was not available; keeping current lms-backend tag."
              fi
              if docker pull "${REGISTRY}/nginx:${PREV_SHA}"; then
                docker tag "${REGISTRY}/nginx:${PREV_SHA}" "lms-nginx:latest"
              else
                echo "::warning::Rollback nginx image ${PREV_SHA} was not available; keeping current lms-nginx tag."
              fi
              docker compose -f docker-compose.prod.yml up -d --remove-orphans
              sleep 10
              if ./scripts/check-origin-health.sh docker-compose.prod.yml "$DOMAIN"; then
                echo "Rollback to $PREV_SHA succeeded."
              else
                echo "::error::Rollback also failed — manual intervention required!"
              fi
            else
              echo "::warning::No previous SHA recorded; cannot auto-rollback."
            fi
            exit 1
          fi

          # ── Record new SHA for future rollbacks ───────────────────────
          echo "$NEW_SHA" > .deployed-sha
          echo "Production deployment of $NEW_SHA complete!"
          ENDSSH
