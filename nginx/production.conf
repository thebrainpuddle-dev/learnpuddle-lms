# Docker DNS resolver — resolves upstream service names dynamically so nginx
# doesn't cache stale container IPs after a backend restart (avoids 502s).
resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 5s;

upstream django {
    server web:8000;
}

upstream websocket {
    server asgi:8001;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=uploads:10m rate=10r/m;

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name learnpuddle.com *.learnpuddle.com;

    # SSL (managed by Certbot or Cloudflare)
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    # X-XSS-Protection removed: deprecated in modern browsers and can introduce
    # vulnerabilities in older ones. CSP provides equivalent and superior protection.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # Prevent cross-origin window access and cross-origin resource embedding.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # font-src includes `data:` for KaTeX's embedded base64 woff2 fonts.
    # script-src: `unsafe-inline` + `unsafe-eval` kept until frontend bundle is audited
    #   for inline event handlers and eval usage (React dev mode, some HLS.js builds).
    #   TODO: remove both once bundle audit confirms they are unused.
    # object-src, base-uri, form-action: safe to lock down immediately on any modern SPA.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' wss: https:; media-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self';" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Client limits — 10M global default; specific locations override for larger
    # uploads (50M for general file uploads, 512M for video uploads only).
    client_max_body_size 10M;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # Static files (cache aggressively)
    location /static/ {
        alias /var/www/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files
    location /media/ {
        alias /var/www/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Frontend assets (Vite build output — baked into the nginx image)
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Prometheus metrics — allow only internal/monitoring networks
    location /metrics {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://django;
        include /etc/nginx/proxy_params;
        access_log off;
    }

    # Flower — Celery monitoring UI (IP restricted to private/monitoring networks)
    # Using a variable for proxy_pass so nginx starts even when the flower
    # container is not yet running (requires the resolver directive above).
    # Accessible only from Docker-internal IPs, VPN, or SSH tunnel.
    location /flower/ {
        set $flower_upstream flower:5555;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://$flower_upstream;
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Auth endpoints (strict rate limiting)
    location /api/users/auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://django;
        include /etc/nginx/proxy_params;
    }

    # Upload endpoints — general file uploads (thumbnails 5M, content files 50M,
    # certificates 10M).  50M override covers the largest content-file type.
    location /api/v1/uploads/ {
        limit_req zone=uploads burst=5 nodelay;
        proxy_pass http://django;
        include /etc/nginx/proxy_params;
        client_max_body_size 50M;
    }

    # Video upload — 512M body limit, no request buffering (chunked streaming).
    # MUST appear before the general /api/ location so it takes precedence.
    # The global 10M limit would silently reject videos larger than 10M otherwise.
    location ~ ^/api/(v1/)?courses/[^/]+/modules/[^/]+/contents/video-upload/?$ {
        limit_req zone=api burst=20 nodelay;
        client_max_body_size 512M;
        proxy_pass http://django;
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
    }

    # SSE/streaming endpoints (no buffering)
    location ~ /api/v1/(teacher|student)/maic/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_redirect off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
        chunked_transfer_encoding off;
        proxy_cache off;
    }

    # API endpoints (standard rate limiting)
    location /api/ {
        limit_req zone=api burst=60 nodelay;
        proxy_pass http://django;
        include /etc/nginx/proxy_params;
    }

    # Health check (no rate limit)
    location /health/ {
        proxy_pass http://django;
        include /etc/nginx/proxy_params;
        access_log off;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Frontend (SPA fallback — served from image build output)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        expires 1h;
    }
}
