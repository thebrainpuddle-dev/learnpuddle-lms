# nginx/nginx.staging.conf
# Staging environment configuration — mirrors production with relaxed settings.
#
# IMPORTANT: This is the sole HTTP server block (port 80).
# The original config had two blocks: an incomplete port-80 block that
# only served the SPA, and a full-featured port-8080 block that was never
# reachable from outside Docker (docker-compose.staging.yml maps only 80:80
# and 443:443 — no 8080:8080).  All API calls therefore fell through to the
# SPA's try_files and returned index.html with 200, making every API request
# appear to silently succeed.  This file fixes that by replacing both blocks
# with a single correct port-80 server that routes all traffic properly.
#
# When SSL is available, uncomment the HTTPS block at the bottom and add a
# plain-HTTP → HTTPS redirect here (or use Certbot's --redirect flag).

# Docker DNS resolver — prevents stale upstream IPs after container restarts.
resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 5s;

# Rate limiting zones (more permissive than production for QA load testing)
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;

# ── HTTP server (port 80) ────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    server_tokens off;

    # Upstream variables — resolved via Docker DNS; prevents 502 on restart.
    set $django_upstream web:8000;
    set $asgi_upstream   asgi:8001;
    set $flower_upstream flower:5555;

    # ── Security headers ──────────────────────────────────────────────────
    # SAMEORIGIN (not DENY) to match production.conf and shared_locations.conf.
    # DENY would break any same-origin iframe embedding that QA needs to test.
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # CSP mirrors production so that XSS/injection issues surface during QA
    # rather than only in production.  unsafe-inline/unsafe-eval remain while
    # the frontend bundle audit is pending (same as production.conf).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' wss: https:; media-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self';" always;

    # ── Gzip compression ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml;

    # ── Global proxy / body limits ────────────────────────────────────────
    client_max_body_size 10M;   # Default; video upload location overrides to 512M
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
    proxy_next_upstream_timeout 15s;

    # ── Static files ──────────────────────────────────────────────────────
    location /static/ {
        alias /var/www/static/;
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Protected media (X-Accel-Redirect target) ─────────────────────────
    location /protected-media/ {
        internal;
        alias /var/www/media/;
        expires 1d;
        access_log off;
    }

    # ── Media → Django auth-gate ──────────────────────────────────────────
    location /media/ {
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Rate-limited auth endpoints ───────────────────────────────────────
    location /api/users/auth/login/ {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Video upload — 512M body limit, no buffering ─────────────────────
    # Must appear BEFORE the general /api/ block so it takes precedence.
    # Matches both /api/courses/... and /api/v1/courses/... URL schemes.
    location ~ ^/api/(v1/)?courses/[^/]+/modules/[^/]+/contents/video-upload/?$ {
        limit_req zone=api burst=20 nodelay;
        client_max_body_size 512M;
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
    }

    # ── Chatbot SSE — disable buffering for real-time streaming ──────────
    location ~ ^/api/v1/[^/]+/chatbots/[^/]+/chat/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_cache off;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;
    }

    # ── OpenMAIC SSE — disable buffering for real-time streaming ─────────
    location ~ ^/api/v1/(teacher|student)/maic/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding off;
        add_header X-Accel-Buffering no;
    }

    # ── General API → Django/Gunicorn ─────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=100 nodelay;
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }

    # ── Django admin ──────────────────────────────────────────────────────
    location /django-admin/ {
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health check (no auth, no logging) ───────────────────────────────
    location /health/ {
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Prometheus metrics — private/monitoring networks only ─────────────
    location /metrics {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # ── Flower — Celery monitoring (IP restricted to private networks) ────
    location /flower/ {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://$flower_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── WebSocket → Daphne ASGI server ───────────────────────────────────
    location /ws/ {
        proxy_pass http://$asgi_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ── React SPA (everything else) ───────────────────────────────────────
    location = /service-worker.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        expires -1;
    }

    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        expires -1;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        expires 1h;
    }
}

# ── HTTPS server (port 443) — uncomment when SSL is configured ───────────────
# To enable: obtain a certificate (e.g., certbot --nginx), then uncomment.
# The HTTP block above becomes an HTTPS redirect when this is active:
