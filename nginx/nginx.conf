# nginx/nginx.conf
# Wildcard subdomain reverse proxy for multi-tenant SaaS LMS
#
# Deployment: Behind Cloudflare with Full (Strict) SSL mode
#   - Cloudflare Origin Certificate on this server
#   - Wildcard DNS (*.learnpuddle.com → this server)
#   - DDoS protection and caching
#
# NOTE: nginx/includes/shared_locations.conf contains all shared location
# blocks, security headers, gzip settings, and proxy timeouts.
# Edit that file (not here) to change routing behaviour — this file only
# holds the listener config and SSL setup.

# ── Cloudflare Real IP ──────────────────────────────────────────────────
# Restore real client IP from CF-Connecting-IP header
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

# Cloudflare IPv4 ranges
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;

# Cloudflare IPv6 ranges
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

# Docker DNS resolver for dynamic service IP updates.
# Without this, nginx can keep stale upstream container IPs after restarts,
# causing intermittent/persistent 502s until nginx is reloaded.
resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 5s;

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# ── HTTP server (port 80 — Cloudflare handles SSL termination) ────────────
# Cloudflare connects to our origin on port 80 (encrypted at the edge).
# We still need to handle HTTP here for health checks / certbot challenges.
server {
    listen 80;
    server_name _;
    server_tokens off;

    # Trust Cloudflare's X-Forwarded-Proto header so Django's
    # request.is_secure() returns True even when we receive plain HTTP.
    set $forwarded_proto $http_x_forwarded_proto;

    # Upstream variable names — resolved via the Docker DNS resolver above.
    # Using variables instead of literal upstreams prevents nginx from failing
    # to start when a container is temporarily down.
    set $django_upstream web:8000;
    set $asgi_upstream   asgi:8001;
    set $flower_upstream flower:5555;

    include /etc/nginx/includes/shared_locations.conf;
}

# ── HTTPS server (port 443 — Cloudflare Origin Certificate) ──────────────
server {
    listen 443 ssl;
    server_name _;
    server_tokens off;

    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Same CF proto trust and upstream variables as the HTTP block.
    set $forwarded_proto $http_x_forwarded_proto;
    set $django_upstream web:8000;
    set $asgi_upstream   asgi:8001;
    set $flower_upstream flower:5555;

    include /etc/nginx/includes/shared_locations.conf;
}
