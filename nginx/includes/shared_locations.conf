# nginx/includes/shared_locations.conf
# Shared location blocks, security headers, gzip, and proxy settings
# included by BOTH the HTTP (port 80) and HTTPS (port 443) server blocks
# in nginx.conf.  Do NOT include this file standalone — it is not a complete
# server block and will produce a syntax error if loaded directly.

    # ── Security headers (defense-in-depth; Cloudflare also adds some) ────
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header Cross-Origin-Resource-Policy same-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://app.cal.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' wss: https:; media-src 'self' blob: https:; object-src 'none'; child-src 'self' blob: https://app.cal.com https://cal.com; worker-src 'self' blob:; frame-src 'self' blob: https://app.cal.com https://cal.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # ── Gzip compression ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Global proxy / body limits ────────────────────────────────────────
    client_max_body_size 10M;   # Default; video upload location overrides to 512M
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
    proxy_next_upstream_timeout 15s;

    # ── React SPA static assets — served before Django /static/ ──────────
    location /static/js/ {
        alias /usr/share/nginx/html/static/js/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /static/css/ {
        alias /usr/share/nginx/html/static/css/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /static/media/ {
        alias /usr/share/nginx/html/static/media/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Django static files (admin, rest_framework, etc.) ────────────────
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Protected media (X-Accel-Redirect target) ─────────────────────────
    location /protected-media/ {
        internal;
        alias /var/www/media/;
        expires 7d;
        access_log off;
    }

    # ── Media proxy — Django checks auth then uses X-Accel-Redirect ──────
    location /media/ {
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # ── Rate-limited auth endpoints ───────────────────────────────────────
    location /api/users/auth/login/ {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location /api/users/auth/request-password-reset/ {
        limit_req zone=login burst=2 nodelay;
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # ── OpenMAIC SSE — disable buffering for real-time streaming ─────────
    location ~ ^/api/v1/(teacher|student)/maic/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding off;
        add_header X-Accel-Buffering no;
    }

    # ── Chatbot SSE — disable buffering for real-time streaming ──────────
    location ~ ^/api/v1/[^/]+/chatbots/[^/]+/chat/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;
    }

    # ── Video upload — 512M body limit, no buffering ─────────────────────
    # Matches both /api/courses/... and /api/v1/courses/... URL schemes.
    # MUST appear before the general /api/ block so it takes precedence.
    location ~ ^/api/(v1/)?courses/[^/]+/modules/[^/]+/contents/video-upload/?$ {
        limit_req zone=api burst=20 nodelay;
        client_max_body_size 512M;  # Large video uploads only
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
    }

    # ── General API → Django/Gunicorn ─────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }

    # ── Django admin (separate from tenant SPA /admin/* routes) ──────────
    location /django-admin/ {
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # ── Health check (no auth, no logging) ───────────────────────────────
    location /health/ {
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Prometheus metrics — private/monitoring network only ─────────────
    location /metrics {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # ── Flower — Celery monitoring (password protected + IP restricted) ───
    location /flower/ {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://$flower_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── WebSocket → Daphne ASGI server ───────────────────────────────────
    location /ws/ {
        proxy_pass http://$asgi_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 86400;
    }

    # ── React SPA (everything else) ───────────────────────────────────────
    location = /service-worker.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        expires -1;
    }

    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        expires -1;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        expires 1h;
    }

    # ── Custom error pages ────────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
