x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  db:
    <<: *common
    image: pgvector/pgvector:pg15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-learnpuddle} -d ${DB_NAME:-learnpuddle_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
    networks:
      - backend

  redis:
    <<: *common
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - backend

  web:
    <<: *common
    image: ${BACKEND_IMAGE:-lms-backend:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: gunicorn config.wsgi:application -c gunicorn.conf.py
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=False
      - DJANGO_SETTINGS_MODULE=config.settings
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(5); s.connect(('127.0.0.1',8000)); s.close()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    networks:
      - backend
      - frontend

  asgi:
    <<: *common
    image: ${BACKEND_IMAGE:-lms-backend:latest}
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=False
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(5); s.connect(('127.0.0.1',8001)); s.close()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    networks:
      - backend
      - frontend

  worker:
    <<: *common
    image: ${BACKEND_IMAGE:-lms-backend:latest}
    command: celery -A config worker -l info --concurrency=4 -Q default,video,notifications
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=False
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --timeout=5 2>&1 | grep -q pong || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    networks:
      - backend

  # ── PERF-P0-5: dedicated TTS worker ────────────────────────────────────
  # Drains only the ``tts`` queue so the per-scene chord fan-out
  # (``apps.courses.maic_tasks._tts_one_scene``) and its callback
  # (``apps.courses.maic_tasks._finalize_classroom_tts``) run in parallel
  # without competing with default-queue workers.  Concurrency is tuned to
  # the TTS provider's per-tenant rate limit (8 by default; raise via
  # ``TTS_WORKER_CONCURRENCY`` if your Azure/Edge plan allows more).
  worker-tts:
    <<: *common
    image: ${BACKEND_IMAGE:-lms-backend:latest}
    command: >
      celery -A config worker -l info
      --concurrency=${TTS_WORKER_CONCURRENCY:-8}
      -Q tts
      -n worker-tts@%h
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=False
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --timeout=5 2>&1 | grep -q pong || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    networks:
      - backend

  beat:
    <<: *common
    image: ${BACKEND_IMAGE:-lms-backend:latest}
    command: celery -A config beat -l info --pidfile=/tmp/celerybeat.pid --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=False
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && kill -0 $(cat /tmp/celerybeat.pid) || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - backend

  flower:
    <<: *common
    image: ${BACKEND_IMAGE:-lms-backend:latest}
    command: >
      celery -A config flower
      --port=5555
      --url_prefix=flower
      --persistent=True
      --db=/tmp/flower.db
      --max_workers=100
      --max_tasks=10000
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=False
      - FLOWER_BASIC_AUTH=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:?Set FLOWER_PASSWORD in .env}
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5555/flower/healthcheck', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - backend
      - frontend

  nginx:
    <<: *common
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
    depends_on:
      - web
      - asgi
    healthcheck:
      # nginx -t validates config; pidof nginx confirms the daemon is actually running.
      # "nginx -t" alone does NOT detect a crashed nginx process (it reads files from disk).
      test: ["CMD-SHELL", "nginx -t 2>/dev/null && pidof nginx > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - frontend

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
